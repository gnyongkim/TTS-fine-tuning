# =============================================================================
#  GPT (s1) 파인튜닝 config — KSS 베이스라인 (RTX 4070 Ti 12GB)
#  GPT-SoVITS 의 s1longer-v2.yaml 을 기반으로 4070 Ti 메모리·KSS 데이터에 맞춰 조정
#
#  사용:
#    python GPT_SoVITS/s1_train.py --config_file configs/s1_kss.yaml
#    (보통 scripts/train_s1.sh 가 자동으로 호출)
#
#  GPT-SoVITS 코드는 yaml 의 train.* / optimizer.* / data.* / model.* / inference.*
#  필드를 읽으며, 추가로 학습 launcher 가 train_semantic_path /
#  train_phoneme_path / output_dir / exp_name / pretrained_s1 / save_weight_dir
#  를 환경변수 또는 CLI 인자로 주입한다 (자세한 건 scripts/train_s1.sh 참고).
# =============================================================================

train:
  seed: 1234
  epochs: 15                  # KSS 단일화자 12시간 → 15 epoch 이면 충분 수렴 (기본 20)
  batch_size: 8               # 4070 Ti 12GB. OOM 발생 시 6 → 4 로 단계적 축소
  save_every_n_epoch: 5       # 디스크 절약 (기본 1 → 5; 약 60MB/ckpt × 3개)
  precision: 16-mixed         # fp16 mixed precision (4070 Ti 권장)
  gradient_clip: 1.0
  if_save_latest: true        # 최신 ckpt 만 보관 (디스크 절약)
  if_save_every_weights: true # half-precision 가중치도 저장 (추론용)
  if_dpo: false               # DPO (Direct Preference Optimization) 미사용 — 베이스라인

optimizer:
  lr: 0.01                    # 피크 LR (워밍업 후)
  lr_init: 0.00001            # 시작 LR
  lr_end: 0.0001              # 종료 LR
  warmup_steps: 2000
  decay_steps: 40000

data:
  max_eval_sample: 8
  max_sec: 54                 # 한 클립 최대 길이(sec). KSS 는 10s 이하라 여유
  num_workers: 4              # 4070 Ti 데스크탑 CPU 기준 (코어 적으면 2)
  pad_val: 1024               # = EOS

model:
  vocab_size: 1025
  phoneme_vocab_size: 732
  embedding_dim: 512
  hidden_dim: 512
  head: 16
  linear_units: 2048
  n_layer: 24
  dropout: 0
  EOS: 1024
  random_bert: 0

inference:
  top_k: 15

# -----------------------------------------------------------------------------
#  본 저장소 wrapper 가 사용할 메타정보 (GPT-SoVITS 본체는 무시)
# -----------------------------------------------------------------------------
_meta:
  exp_name: kss_baseline_s1
  pretrained_s1_filename: s1bert25hz-5kh-longer-epoch=12-step=369668.ckpt
  notes: |
    - 베이스라인 검증용. KSS 라이선스(CC BY-NC-SA 4.0) 비상업.
    - OOM 발생 시: train.batch_size 8 → 6 → 4 순으로 축소.
    - 너무 빠르게 수렴하거나 발음이 깨지면 epochs 15 → 10, lr 0.01 → 0.005 시도.
